<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ancient Greece: An Interactive Chronology</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        #app-scale {
            position: fixed;
            inset: 0;
            width: calc(100vw / 0.85);
            height: calc(100vh / 0.85);
            transform: scale(0.85);
            transform-origin: top left;
            overflow: hidden;
            background-color: var(--sand);
        }
        .bg-image,
        #drag-thumb,
        .text-container,
        .git-node,
        .git-label-box,
        #trackCanvas {
            will-change: transform, opacity;
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }
        :root {
            --git-dark: #37474f;
            --git-main: #b3e5fc;
            --git-branch-up: #ce93d8;
            --git-branch-down: #69f0ae;
            --sand: #f4f1ea;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Lora', serif;
            background-color: var(--sand);
            overflow: hidden;
            touch-action: none;
        }

        h1, h2, h3, .heading-font {
            font-family: 'Cinzel', serif;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(55, 71, 79, 0.05); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(55, 71, 79, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--git-dark); }

        #bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.55s ease-out, transform 1.8s ease-out;
            transform: scale(1.01) translateZ(0);
        }

        .bg-image.active {
            opacity: 1;
            transform: scale(1.04) translateZ(0);
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(244, 241, 234, 0.35);
            backdrop-filter: blur(2px);
            z-index: 2;
        }

        .header-container {
            position: absolute;
            top: 2.5%;
            left: 3%;
            transform: none;
            z-index: 10;
            text-align: left;
            width: auto;
            max-width: none;
        }

        #mainHeading {
            margin: 0;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--git-dark);
        }

        .git-slider-wrapper {
            position: absolute;
            top: 39%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 97%;
            max-width: 1600px;
            height: 310px;
            z-index: 10;
        }

        #trackCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 11;
            pointer-events: none;
        }

        .git-node {
            position: absolute;
            width: 24px;
            height: 24px;
            border: 4px solid var(--git-dark);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 12;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .git-node.main-node { background: var(--git-main); }
        .git-node.branch-up { background: var(--git-branch-up); }
        .git-node.branch-down { background: var(--git-branch-down); }

        .git-node:hover {
            transform: translate(-50%, -50%) scale(1.2);
        }

        .git-label-box {
            position: absolute;
            border: 3px solid var(--git-dark);
            padding: 4px 10px;
            font-family: monospace;
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--git-dark);
            white-space: nowrap;
            transform: translateX(-50%);
            z-index: 13;
            pointer-events: none;
            box-shadow: 2px 2px 0px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .git-label-arrow {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.1rem;
            color: var(--git-dark);
            font-weight: bold;
        }

        .box-main { background: var(--git-main); bottom: calc(100% + 20px); }
        .box-up { background: var(--git-branch-up); bottom: calc(100% + 15px); }
        .box-down { background: var(--git-branch-down); top: calc(100% + 15px); }

        #drag-thumb {
            position: absolute;
            width: 32px;
            height: 32px;
            background: var(--git-main);
            border: 3px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            box-shadow: 0 0 10px rgba(179, 229, 252, 0.8), 0 2px 4px rgba(0,0,0,0.3);
            z-index: 50;
            transition: transform 0.1s ease, background 0.3s ease, box-shadow 0.3s ease;
        }

        #drag-thumb:active {
            cursor: grabbing;
            transform: translate(-50%, -50%) scale(1.15);
        }

        .text-container {
            position: absolute;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            width: 96%;
            max-width: 1420px;
            z-index: 10;
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
            opacity: 1;
        }

        .text-container.fading {
            opacity: 0;
            transform: translateX(-50%) translateY(15px);
        }

        .info-card {
            background: rgba(255, 255, 255, 0.95);
            border-top: 5px solid var(--git-dark);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
        }

        .desc-scroll {
            max-height: 22vh;
            overflow-y: auto;
            padding-right: 15px;
            margin-top: 10px;
            text-align: justify;
        }

        @media (max-width: 900px) {
            #app-scale {
                width: 100vw;
                height: 100vh;
                transform: none;
            }

            .git-slider-wrapper {
                top: 35%;
                width: 98%;
                height: 220px;
            }

            .git-label-box {
                max-width: 140px;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            #mainHeading {
                font-size: 1.15rem;
            }

            .text-container {
                width: 96%;
                max-width: none;
            }

            .desc-scroll {
                max-height: 27vh;
            }

            .git-node {
                width: 20px;
                height: 20px;
                border-width: 3px;
            }
        }
    </style>
</head>
<body>
<div id="app-scale">

    <div id="bg-container"></div>
    <div class="overlay"></div>

    <div class="header-container">
    <h1 class="heading-font" id="mainHeading">Evolution of Ancient Greece</h1>
</div>

<div class="git-slider-wrapper" id="slider-wrapper">
    <canvas id="trackCanvas"></canvas>
    <div id="drag-thumb"></div>
</div>

<div class="text-container" id="textContainer">
    <div class="info-card rounded-2xl p-5 md:p-6">
        <div class="flex flex-col md:flex-row md:items-start justify-between border-b pb-3 mb-2" style="border-color: rgba(55, 71, 79, 0.2);">
            <div>
                <div class="flex items-center gap-3 mb-1">
                    <span id="nodeTypeBadge" class="px-2 py-0.5 text-xs font-bold uppercase tracking-wider rounded border text-white"></span>
                    <div class="heading-font text-lg md:text-xl font-bold text-gray-600" id="eventDate"></div>
                </div>
                <h2 class="heading-font text-2xl md:text-4xl font-bold text-gray-900" id="eventTitle"></h2>
            </div>
            <div class="mt-3 md:mt-0 bg-gray-100 px-4 py-2 rounded-lg border border-gray-200 self-start">
                <span class="text-[10px] text-gray-500 uppercase tracking-wider block mb-0.5">Synthesis Focus</span>
                <span class="text-sm font-bold text-gray-800" id="eventFocus"></span>
            </div>
        </div>

        <div class="desc-scroll text-gray-700 text-sm md:text-base leading-loose" id="eventDesc"></div>
    </div>
</div>

<script>
    const nodeData = {
        main_1: {
            x: 6, y: 50, type: 'main-node', label: 'Foundations', hasBox: false,
            date: 'c. 3100–2000 BC',
            title: 'Early Bronze Age Foundations',
            focus: 'Geography, Seafaring, and the First Aegean Networks',
            img: './bronzeAge.jpg',
            desc: `The earliest phase of Greek civilization took shape not as a single kingdom but as a scattered Aegean world of islands, coasts, valleys, and small farming communities. Geography mattered from the beginning. The mountains of mainland Greece discouraged the formation of one easy political center, while the surrounding sea encouraged exchange, movement, and experimentation. During the Early Bronze Age, communities in the Cyclades, Crete, and parts of the mainland began to develop stronger economic ties through maritime routes that linked them to one another and to the eastern Mediterranean. Agriculture remained the base of life, but seaborne trade in obsidian, metals, pottery, and crafted goods made the Aegean more interconnected than a map of isolated settlements might suggest. This was also the period in which metallurgy became more important, reshaping tools, weapons, and prestige objects. Burial customs, figurines, and communal tombs show that social distinctions were emerging, but power was still relatively local and community-based compared with later palace systems. What makes this era historically crucial is that it established the structural habits that would define Greek history for centuries: local independence, reliance on the sea, and a cultural world formed through contact rather than isolation. Ancient Greece did not begin as a ready-made civilization; it emerged from these early experiments in settlement, production, and exchange across a fragmented but intensely connected landscape.`
        },

        main_2: {
            x: 16, y: 50, type: 'main-node', label: 'Minoan', hasBox: false,
            date: 'c. 2000–1450 BC',
            title: 'Minoan Crete and the Palatial Age',
            focus: 'Redistribution, Ritual, and Maritime Supremacy',
            img: './Minoan.jpg',
            desc: `By about 2000 BC, Crete produced the first fully developed palatial civilization in the Greek world. The Minoans organized life around large palace centers such as Knossos, Phaistos, Malia, and Zakros. These were not simply royal residences. They were administrative, economic, ritual, and storage complexes that collected agricultural surplus, coordinated craft production, and redistributed resources. Their architecture, with central courts, storage magazines, painted rooms, and advanced building techniques, reflects a society of remarkable complexity. Minoan frescoes and luxury objects reveal strong visual sophistication, maritime confidence, and sustained contact with Egypt, Cyprus, and the Levant. Religion seems to have been deeply woven into public life, and women appear with unusual prominence in artistic and ritual contexts compared with many later mainland traditions. One of the most debated features of Minoan civilization is the relative lack of fortification at major palace sites, which suggests that naval control and insular position offered some protection or that the island’s power was projected through trade and sea power rather than fortress warfare. The Minoans also used writing, especially Linear A, although it remains undeciphered. Economically, culturally, and symbolically, Minoan Crete became the first great center of the Aegean. Its importance lies not only in its wealth, but in the model it established: centralized administration, regional coordination, monumental architecture, and a maritime outlook that turned the sea from a barrier into the main medium of civilization.`
        },

        main_3: {
            x: 26, y: 50, type: 'main-node', label: 'Mycenaean', hasBox: false,
            date: 'c. 1600–1100 BC',
            title: 'Mycenaean Greece and Warrior Kingship',
            focus: 'Fortified Power, Bureaucracy, and Expansion',
            img: './Mycenaean.jpg',
            desc: `While Crete dominated the southern Aegean, a different political order emerged on the mainland. Mycenaean civilization was more militarized, more visibly hierarchical, and more fortress-centered than Minoan Crete. The major centers—Mycenae, Tiryns, Pylos, and Thebes—were built around citadels with massive defensive walls that later Greeks called Cyclopean because the stones seemed too large for ordinary builders. Their ruling structure revolved around palace authority, elite warriors, land control, and bureaucratic management. The Mycenaeans borrowed heavily from Minoan culture, but they adapted what they took into a more martial political system. Their graves contain gold masks, weapons, imported goods, and prestige items that display both wealth and status competition. A decisive development was the use of Linear B, a script adapted from the Cretan tradition but used to write an early form of Greek. The surviving tablets show a world of careful accounting: livestock, bronze, textiles, labor obligations, and offerings were recorded for administrative purposes. That evidence makes Mycenaean Greece the earliest historically documented Greek-speaking civilization. Militarily and commercially, the Mycenaeans reached well beyond the mainland and ultimately took control of Crete. They participated in wider Mediterranean exchange and may stand behind later memories preserved in epic traditions about great kings, heroic warfare, and overseas expeditions. Their importance in Greek history is double: they created the earliest palace states on the mainland, and they preserved the Greek language in written form long before the classical city-states existed.`
        },

        main_4: {
            x: 36, y: 50, type: 'main-node', label: 'Collapse', hasBox: false,
            date: 'c. 1200–800 BC',
            title: 'Bronze Age Collapse and the Dark Age Transformation',
            focus: 'Systemic Breakdown, Survival, and Reorganization',
            img: './darkages.jpg',
            desc: `Around 1200 BC, the interconnected palace world of the eastern Mediterranean began to unravel, and Mycenaean Greece was drawn into that wider collapse. Major centers were destroyed or abandoned, long-distance exchange contracted, population declined in many areas, and the palace bureaucracies disappeared. Because Linear B had served administrative institutions rather than a broad reading public, writing vanished together with the palace system. This is why the period that followed was long called the Greek Dark Age. Yet the phrase can mislead. It was a time of major disruption, but not of total civilizational disappearance. Communities survived, adapted, migrated, and rebuilt on a smaller scale. Political life became more local, centered on households, kin groups, and village elites instead of palace administrations. Material culture changed as well. The transition to iron gradually reduced dependence on complex bronze supply systems and altered both farming and warfare in the long run. Some regions, such as Euboea, maintained stronger overseas contacts than others, proving that the Aegean world never became completely isolated. What collapsed was not Greek culture as such, but a specific centralized Bronze Age order. This matters historically because later Greece was born from that collapse. The old palaces fell, but their disappearance opened space for new social forms, new balances of power, and eventually new political institutions. The citizen communities, alphabets, and city-states of later centuries were not continuations of the palaces. They emerged from a harder, poorer, but more flexible world that learned to reorganize itself after catastrophe.`
        },

        main_5: {
            x: 46, y: 50, type: 'main-node', label: 'Archaic', hasBox: false,
            date: 'c. 800–600 BC',
            title: 'Recovery, the Polis, and Mediterranean Expansion',
            focus: 'City-States, Colonization, and Shared Hellenic Identity',
            img: './polis.jpg',
            desc: `By the eighth century BC, Greek society had recovered enough to generate a new political and cultural order centered on the polis, the independent city-state. This was the real beginning of the Greece most people recognize. Instead of palace kingdoms, the Greek world now consisted of many autonomous communities with their own institutions, laws, armies, and civic identities. Geography again played a decisive role: mountains, gulfs, and islands favored political fragmentation, and that fragmentation became one of the defining features of Greek history. Yet the same period also produced stronger cultural unity. Greeks shared related dialects, common sanctuaries, similar religious practices, and expanding participation in panhellenic festivals. Overseas colonization accelerated dramatically as communities founded settlements across southern Italy, Sicily, the Black Sea, and the western Mediterranean. Colonization did not create one Greek empire; rather, it spread Greek language, trade, and civic models into a larger world while relieving local pressures and opening new commercial routes. At the same time, craft production, exchange, and aristocratic competition intensified. Sanctuaries became places where poleis displayed wealth and identity, and epic poetry helped shape a broader sense of Greekness. This was also the age in which the polis began to define belonging not simply through kinship, but through community, territory, and participation. The Archaic revival therefore matters not only because Greece recovered from the Dark Age, but because it recovered differently: more decentralized, more outward-looking, and more politically inventive than the Bronze Age world that had preceded it.`
        },

        main_6: {
            x: 56, y: 50, type: 'main-node', label: 'Reforms', hasBox: false,
            date: 'c. 600–480 BC',
            title: 'Reform, Tyranny, and the Road to Democracy',
            focus: 'Class Conflict, Law, and Political Experimentation',
            img: './sphinx.jpg',
            desc: `The later Archaic period was one of the most politically experimental phases in Greek history. Economic growth, wider trade, and the increasing role of hoplite infantry began to challenge older aristocratic monopolies. Power could no longer rest only on noble birth when more citizens contributed to warfare, production, and the public life of the community. Across the Greek world, poleis responded in different ways. Some experienced tyranny, which in the ancient Greek sense meant rule seized outside traditional constitutional channels. Tyrants could be harsh, but they were not all identical, and in several cities they weakened aristocratic factions, supported public works, and altered the balance of power. Athens followed one of the most important trajectories. The harsh law code associated with Draco showed the severity of internal tensions. Solon then attempted reform by addressing debt slavery, reordering political access through property classes, and opening more space for civic participation. Later, Cleisthenes reorganized the citizen body in a way that cut across old kinship blocs and laid the institutional foundations of Athenian democracy. During the same broad period, rational inquiry expanded in the Greek world. Thinkers in Ionia and elsewhere began to ask what the universe was made of, how order could be explained, and whether nature followed principles discoverable by reason. This era therefore changed Greece in two linked ways: politically, it widened the range of who could claim a role in the state; intellectually, it widened the range of questions humans could ask about law, nature, and justice.`
        },

        main_7: {
            x: 66, y: 50, type: 'main-node', label: 'Classical', hasBox: false,
            date: '480–431 BC',
            title: 'Persian Wars and the Classical High Point',
            focus: 'Collective Defense, Athenian Power, and Cultural Brilliance',
            img: './persian.jpeg',
            desc: `The defeat of the Persian invasions transformed the Greek world. For the first time, many poleis confronted a vast imperial power in a struggle that later Greeks interpreted as a defense of autonomy against domination. The victories at Marathon, Salamis, and Plataea did not erase rivalry among the city-states, but they produced enormous cultural confidence and political consequence. Athens emerged from the wars with unmatched naval prestige and used the Delian League, originally an anti-Persian alliance, to construct an empire of tribute-paying allies. That imperial revenue funded fleets, public pay, temples, monuments, and the civic institutions that made fifth-century Athens so influential. Under Pericles and his contemporaries, Athenian democracy deepened, though it remained limited to male citizens. The cultural output of this age was extraordinary. Tragedy and comedy became major civic art forms; sculpture and architecture reached new standards of proportion and clarity; and philosophers pushed ethical and political thought in new directions. The Parthenon, the theater, and the civic assembly all embodied a civilization intensely invested in public display, debate, and collective identity. Yet this was not a peaceful golden shell floating above history. The same Athens that generated drama, philosophy, and monumental architecture also imposed tribute, suppressed revolts, and exercised coercive empire. The Classical high point therefore deserves to be understood as a synthesis of freedom and domination, civic creativity and strategic power. It was brilliant because its institutions and culture were so ambitious, but it also carried within itself the tensions that would soon tear the Greek world apart.`
        },

        main_8: {
            x: 76, y: 50, type: 'main-node', label: 'Conflict', hasBox: false,
            date: '431–359 BC',
            title: 'Peloponnesian War and the Fracturing of Greece',
            focus: 'Attrition, Rivalry, and Exhausted Independence',
            img: './Peloponnesian.jpeg',
            desc: `The Peloponnesian War shattered the political balance of the Greek world. What had once been a rivalry between two powerful blocs—Athens and its maritime empire, Sparta and its land-based alliance—became a drawn-out struggle that consumed lives, wealth, and trust across the Aegean. The war also changed the character of conflict itself. Greek warfare was no longer a matter of limited seasonal clashes between neighboring hoplite armies. It now involved naval campaigning, sieges, civil strife inside allied cities, shifting diplomacy, and mass suffering among civilians. Athens endured plague, political turmoil, and strategic overreach; Sparta eventually adapted, built naval power with Persian financial support, and forced Athens to surrender. Yet Spartan victory did not restore stability. Sparta lacked the demographic and institutional flexibility to dominate the Greek world for long, and the following decades saw new struggles involving Thebes, Persia, shifting coalitions, and further exhaustion. The result was not a single decisive replacement of one hegemon by another, but the weakening of the entire city-state system. The classical polis remained culturally vibrant, but strategically vulnerable. This period matters because it marks the end of the idea that the major Greek powers could preserve their independence through endless internal competition. The Greek world still produced commanders, thinkers, and statesmen, but its energies were increasingly spent against itself. By the mid-fourth century BC, the city-states that had once defined Greek political life were divided enough that a strong outsider from the north could enter not merely as a raider, but as the new master of Greece.`
        },

        main_9: {
            x: 86, y: 50, type: 'main-node', label: 'Macedon', hasBox: false,
            date: '359–323 BC',
            title: 'Philip II, Alexander, and the End of the Old Polis Order',
            focus: 'Military Innovation, Unification, and Conquest',
            img: './alexander.jpg',
            desc: `The rise of Macedon ended the centuries-long age in which the southern city-states controlled the political destiny of the Greek world. Philip II transformed Macedon from a vulnerable kingdom into a disciplined military power through reorganization, diplomacy, and relentless campaigning. His innovations included the development of a more flexible combined-arms army, especially the Macedonian phalanx equipped with the long sarissa, supported by cavalry and siege capabilities. Philip also understood that money, marriage alliances, and political manipulation were as important as battlefield success. His victory at Chaeronea in 338 BC decisively broke effective Greek resistance and established Macedonian hegemony. Yet Philip did not simply destroy Greek institutions; he repositioned them beneath a larger royal framework and projected their energies toward Persia. Alexander inherited that framework and turned it into a world empire. In little more than a decade he destroyed the Achaemenid Empire, marched through Asia Minor, Egypt, Mesopotamia, Persia, and into parts of Central and South Asia, and founded or refounded cities that helped carry Greek language and institutions far beyond the Aegean. Alexander’s significance lies not only in conquest. He changed scale. Greek history ceased to be primarily the story of rival poleis and became the story of kingdoms, imperial courts, and transregional exchange. The old city-state was not instantly erased, but it was permanently displaced from the center of power. Macedon did what no polis had managed: it unified Greece politically enough to push outward and redraw the map of the eastern Mediterranean and Near East.`
        },

        main_10: {
            x: 94, y: 50, type: 'main-node', label: 'Hellenistic-Roman', hasBox: false,
            date: '323 BC onward',
            title: 'Hellenistic Kingdoms and the Greco-Roman Synthesis',
            focus: 'Cosmopolitanism, Knowledge, and Cultural Survival',
            img: './hellenism.jpg',
            desc: `Alexander’s death in 323 BC left no stable succession, and his empire fragmented into competing kingdoms ruled by his generals and their dynasties. The result was the Hellenistic world: not a unified empire, but a vast zone in which Greek language, institutions, art, and education circulated through royal courts and newly enlarged cities such as Alexandria, Antioch, and Pergamon. This was a major transformation in scale and mentality. The political center shifted away from the small autonomous polis toward large bureaucratic monarchies. At the same time, Greek culture became more international than ever before. Science, mathematics, geography, and literary scholarship flourished under royal patronage; philosophy increasingly addressed the individual’s place in a large and unstable world. The Hellenistic age also produced new artistic styles that were more emotional, dramatic, and diverse than the restrained balance associated with the Classical era. Over time, however, the rival kingdoms weakened each other and fell under the expanding influence of Rome. The Roman conquest of Greece did not erase Greek civilization. Instead, it produced one of history’s most influential cultural syntheses. Greek language, philosophy, education, religion, art, and architectural forms deeply shaped Roman elite culture, while Roman administration, infrastructure, and imperial organization provided the political frame through which Hellenic traditions endured. This final stage is therefore not a simple ending. It is the mechanism by which Greek civilization outlived Greek political independence. Through Rome, the Greek world entered a second life, preserving and transmitting ideas that would shape later Europe, Byzantium, and much of the Mediterranean intellectual tradition.`
        },

        branch_1:
            { x: 11.5, y: 15, type: 'branch-up', label: 'Cyclades', hasBox: true,
            date: '3rd millennium BC',
            title: 'Cycladic Marble Figurines',
            focus: 'Shared Symbolism Across the Islands',
            img: './cycladic.jpg',
            desc: `The Cycladic islands produced highly distinctive marble figurines, many found in burials. Their reduced, geometric forms suggest a shared symbolic language long before the classical period. They show that even early Aegean communities already participated in cultural exchange networks that crossed the sea and linked otherwise small island societies.`
        },

        branch_2:
            { x: 22.5, y: 85, type: 'branch-down', label: 'Knossos', hasBox: true,
            date: 'c. 1900 BC onward',
            title: 'The Palace of Knossos',
            focus: 'Administrative and Ritual Center',
            img: './Knossos.jpg',
            desc: `Knossos became the best-known Minoan palace center. Its storage magazines, courts, painted rooms, and administrative character show how Cretan power worked through redistribution and ceremony rather than through a single visible throne-centered monarchy in the later mainland sense.`
        },

        branch_3:
            { x: 32.5, y: 15, type: 'branch-up', label: 'Thera', hasBox: true,
            date: 'Late 17th–16th c. BC',
            title: 'The Thera Eruption',
            focus: 'Aegean Environmental Shock',
            img: './thera.jpeg',
            desc: `The volcanic eruption on Thera was one of the great natural disasters of the ancient Mediterranean. It likely disrupted trade and damaged regional systems, though historians still debate exactly how directly it contributed to the weakening of Minoan power.`
        },

        branch_4:
            { x: 43.5, y: 85, type: 'branch-down', label: 'Lefkandi', hasBox: true,
            date: 'c. 10th c. BC',
            title: 'Lefkandi and Dark Age Continuity',
            focus: 'Wealth After Collapse',
            img: './Lefkandi.jpg',
            desc: `The site of Lefkandi on Euboea shows that the so-called Dark Age was not uniform decline everywhere. Monumental burial, imported goods, and evidence of overseas contacts reveal that some communities preserved wealth and long-distance connections even after palace society collapsed.`
        },

        branch_5:
            { x: 54.5, y: 15, type: 'branch-up', label: 'Alphabet', hasBox: true,
            date: 'c. 8th c. BC',
            title: 'Adoption of the Greek Alphabet',
            focus: 'Literacy Beyond Bureaucracy',
            img: './alphabet.jpg',
            desc: `The Greek adoption and adaptation of the Phoenician alphabet was revolutionary because it made writing flexible and widely usable. Unlike Linear B, which had served palace administration, alphabetic writing could record poetry, dedications, law, and public communication.`
        },

        branch_6:
            { x: 65.5, y: 85, type: 'branch-down', label: 'Olympia', hasBox: true,
            date: '776 BC',
            title: 'The First Secure Olympic Date',
            focus: 'Panhellenic Identity',
            img: './firstolympics.jpg',

        branch_7:
            { x: 76.5, y: 15, type: 'branch-up', label: 'Cleisthenes', hasBox: true,

            title: 'Democratic Reorganization in Athens',
            focus: 'Citizenship Reframed',
            img: './Cleisthenes.jpg',
            desc: `Cleisthenes reorganized the Athenian citizen body in a way that weakened old aristocratic power blocs. His reforms are widely treated as the institutional foundation of Athenian democracy because they tied political participation more strongly to civic structure than to clan privilege.`

        branch_8:

            title: 'The Trial of Socrates',

            img: './socrates.jpeg',
            desc: `Socrates’ execution became one of the defining moments in Greek intellectual history. By turning philosophy toward ethical questioning, public reasoning, and critique of assumption, he shaped later thought through Plato and beyond, even though Athens condemned him.`

        branch_9:
            { x: 92.5, y: 15, type: 'branch-up', label: 'Chaeronea', hasBox: true,
            date: '338 BC',

            focus: 'Macedonian Supremacy',
            img: './Battle of Chaeronea.png',
            desc: `Philip II’s victory at Chaeronea over Athens and Thebes ended effective military resistance to Macedonian domination in mainland Greece. It marks the turning point at which the independent polis ceased to be the highest political force in the Greek world.`

        branch_10:
            { x: 96.5, y: 85, type: 'branch-down', label: 'Alexandria', hasBox: true,
            date: '3rd c. BC',
            title: 'The Library of Alexandria',
            focus: 'Knowledge on an Imperial Scale',
            img: './alexandria.jpeg',
            desc: `Under the Ptolemies, Alexandria became a leading center of scholarship. Its library and research culture symbolize the Hellenistic shift from local civic identity to cosmopolitan knowledge networks supported by powerful monarchies and connected urban institutions.`

        branch_11:
            { x: 90.5, y: 85, type: 'branch-down', label: 'Corinth', hasBox: true,
            date: '146 BC',
            title: 'Roman Destruction of Corinth',
            focus: 'Political Independence Ends',
            img: './Corinth.jpg',
            desc: `The Roman destruction of Corinth in 146 BC stands as a stark symbol of the end of Greek political independence. Yet it also begins the paradoxical Roman phase in which Greek culture increasingly shaped the conqueror.`

    };

    function smoothstep(t) {
        return t * t * (3 - 2 * t);
    }

    const tracks = [
        { id: 'main', xMin: 5, xMax: 94.5, getY: (x) => 50 },

        { id: 'b1',  xMin: 6,  xMax: 11.5, getY: (x) => x < 9.5  ? 50 - 35 * smoothstep((x - 6)  / 3.5) : 15 },
        { id: 'b2',  xMin: 16, xMax: 22.5, getY: (x) => x < 19.5 ? 50 + 35 * smoothstep((x - 16) / 3.5) : 85 },
        { id: 'b3',  xMin: 26, xMax: 32.5, getY: (x) => x < 29.5 ? 50 - 35 * smoothstep((x - 26) / 3.5) : 15 },
        { id: 'b4',  xMin: 36, xMax: 43.5, getY: (x) => x < 39.5 ? 50 + 35 * smoothstep((x - 36) / 3.5) : 85 },
        { id: 'b5',  xMin: 46, xMax: 54.5, getY: (x) => x < 50   ? 50 - 35 * smoothstep((x - 46) / 4.0) : 15 },
        { id: 'b6',  xMin: 56, xMax: 65.5, getY: (x) => x < 60   ? 50 + 35 * smoothstep((x - 56) / 4.0) : 85 },
        { id: 'b7',  xMin: 66, xMax: 76.5, getY: (x) => x < 70   ? 50 - 35 * smoothstep((x - 66) / 4.0) : 15 },
        { id: 'b8',  xMin: 76, xMax: 85.5, getY: (x) => x < 80   ? 50 + 35 * smoothstep((x - 76) / 4.0) : 85 },
        { id: 'b9',  xMin: 86, xMax: 92.5, getY: (x) => x < 89.5 ? 50 - 35 * smoothstep((x - 86) / 3.5) : 15 },
        { id: 'b11', xMin: 86, xMax: 90.5, getY: (x) => x < 89 ? 50 + 35 * smoothstep((x - 86) / 3.0) : 85 },
        { id: 'b10', xMin: 94, xMax: 96.5, getY: (x) => x < 95.5 ? 50 + 35 * smoothstep((x - 94) / 1.5) : 85 }
    ];

    const sliderWrapper = document.getElementById('slider-wrapper');
    const bgContainer = document.getElementById('bg-container');
    const thumb = document.getElementById('drag-thumb');
    const canvas = document.getElementById('trackCanvas');
    const ctx = canvas.getContext('2d');
    let activeNodeId = null;

    function initUI() {
        Object.keys(nodeData).forEach(id => {
            const img = document.createElement('img');
            img.src = nodeData[id].img;
            img.className = 'bg-image';
            img.id = `bg-${id}`;
            img.alt = nodeData[id].title;
            bgContainer.appendChild(img);
        });

        Object.keys(nodeData).forEach(id => {
            const node = nodeData[id];

            const dot = document.createElement('div');
            dot.className = `git-node ${node.type}`;
            dot.id = `node-${id}`;
            dot.style.left = `${node.x}%`;
            dot.style.top = `${node.y}%`;
            dot.addEventListener('click', () => snapToNode(id));
            sliderWrapper.appendChild(dot);

            if (node.hasBox) {
                const labelBox = document.createElement('div');
                let boxClass = '';
                let arrowHTML = '';

                if (node.type === 'main-node') {
                    boxClass = 'box-main';
                    arrowHTML = `<div class="git-label-arrow" style="top: 100%; margin-top: -2px;">&#8595;</div>`;
                } else if (node.type === 'branch-up') {
                    boxClass = 'box-up';
                    arrowHTML = `<div class="git-label-arrow" style="top: 100%; margin-top: -2px;">&#8595;</div>`;
                } else {
                    boxClass = 'box-down';
                    arrowHTML = `<div class="git-label-arrow" style="bottom: 100%; margin-bottom: -2px;">&#8593;</div>`;
                }

                labelBox.className = `git-label-box ${boxClass}`;
                labelBox.style.left = `${node.x}%`;
                labelBox.innerHTML = `${node.label} ${arrowHTML}`;
                sliderWrapper.appendChild(labelBox);
            }
        });

        window.addEventListener('resize', drawCanvasPaths);
        drawCanvasPaths();
        snapToNode('main_1');
    }

    function drawCanvasPaths() {
        const rect = sliderWrapper.getBoundingClientRect();
        canvas.width = rect.width * window.devicePixelRatio;
        canvas.height = rect.height * window.devicePixelRatio;

        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

        ctx.clearRect(0, 0, rect.width, rect.height);
        ctx.strokeStyle = '#37474f';
        ctx.lineWidth = 6;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        tracks.forEach(track => {
            ctx.beginPath();
            for (let x = track.xMin; x <= track.xMax; x += 0.2) {
                const y = track.getY(x);
                const px = (x / 100) * rect.width;
                const py = (y / 100) * rect.height;

                if (x === track.xMin) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.stroke();
        });
    }

    function snapToNode(id) {
        const node = nodeData[id];
        thumb.style.left = `${node.x}%`;
        thumb.style.top = `${node.y}%`;
        activateContent(id);
    }

    let isDragging = false;

    function getClosestTrackPosition(mouseX, mouseY) {
        let bestDist = Infinity;
        let bestX = 5, bestY = 50;

        tracks.forEach(track => {
            const clampedX = Math.max(track.xMin, Math.min(track.xMax, mouseX));
            const trackY = track.getY(clampedX);

            const dx = mouseX - clampedX;
            const dy = mouseY - trackY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < bestDist) {
                bestDist = dist;
                bestX = clampedX;
                bestY = trackY;
            }
        });

        return { x: bestX, y: bestY };
    }

    function checkProximityToNodes(px, py) {
        let closestId = activeNodeId;
        let minDist = Infinity;

        Object.keys(nodeData).forEach(id => {
            const node = nodeData[id];
            const dist = Math.sqrt(Math.pow(px - node.x, 2) + Math.pow(py - node.y, 2));
            if (dist < minDist) {
                minDist = dist;
                closestId = id;
            }
        });

        if (minDist < 2.8 && closestId !== activeNodeId) {
            activateContent(closestId);
        }
        return closestId;
    }

    thumb.addEventListener('pointerdown', (e) => {
        isDragging = true;
        thumb.style.transition = 'none';
        thumb.setPointerCapture(e.pointerId);
        e.preventDefault();
    });

    thumb.addEventListener('pointermove', (e) => {
        if (!isDragging) return;

        const rect = sliderWrapper.getBoundingClientRect();
        const mouseX = ((e.clientX - rect.left) / rect.width) * 100;
        const mouseY = ((e.clientY - rect.top) / rect.height) * 100;

        const constrainedPos = getClosestTrackPosition(mouseX, mouseY);

        thumb.style.left = `${constrainedPos.x}%`;
        thumb.style.top = `${constrainedPos.y}%`;

        checkProximityToNodes(constrainedPos.x, constrainedPos.y);
    });

    thumb.addEventListener('pointerup', (e) => {
        if (!isDragging) return;
        isDragging = false;
        thumb.style.transition = 'transform 0.1s ease, left 0.3s ease, top 0.3s ease';
        thumb.releasePointerCapture(e.pointerId);

        const px = parseFloat(thumb.style.left);
        const py = parseFloat(thumb.style.top);

        let closestId = activeNodeId;
        let minDist = Infinity;

        Object.keys(nodeData).forEach(id => {
            const node = nodeData[id];
            const dist = Math.sqrt(Math.pow(px - node.x, 2) + Math.pow(py - node.y, 2));
            if (dist < minDist) {
                minDist = dist;
                closestId = id;
            }
        });

        snapToNode(closestId);
    });

    function activateContent(id) {
        if (activeNodeId === id) return;

        const oldBg = activeNodeId ? document.getElementById(`bg-${activeNodeId}`) : null;
        const newBg = document.getElementById(`bg-${id}`);
        const tc = document.getElementById('textContainer');
        const data = nodeData[id];

        if (oldBg) oldBg.classList.remove('active');
        newBg.classList.add('active');

        tc.classList.add('fading');

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                document.getElementById('eventDate').innerText = data.date;
                document.getElementById('eventTitle').innerText = data.title;
                document.getElementById('eventFocus').innerText = data.focus;
                document.getElementById('eventDesc').innerHTML = data.desc;

                const badge = document.getElementById('nodeTypeBadge');

                if (data.type === 'main-node') {
                    badge.innerText = 'Master Branch';
                    badge.style.backgroundColor = 'var(--git-main)';
                    badge.style.color = 'var(--git-dark)';
                    badge.style.borderColor = 'var(--git-dark)';
                    thumb.style.background = 'var(--git-main)';
                    thumb.style.boxShadow = '0 0 10px rgba(179, 229, 252, 0.8), 0 2px 4px rgba(0,0,0,0.3)';
                } else if (data.type === 'branch-up') {
                    badge.innerText = 'Feature Branch';
                    badge.style.backgroundColor = 'var(--git-branch-up)';
                    badge.style.color = 'var(--git-dark)';
                    badge.style.borderColor = 'var(--git-dark)';
                    thumb.style.background = 'var(--git-branch-up)';
                    thumb.style.boxShadow = '0 0 10px rgba(206, 147, 216, 0.8), 0 2px 4px rgba(0,0,0,0.3)';
                } else {
                    badge.innerText = 'Feature Branch';
                    badge.style.backgroundColor = 'var(--git-branch-down)';
                    badge.style.color = 'var(--git-dark)';
                    badge.style.borderColor = 'var(--git-dark)';
                    thumb.style.background = 'var(--git-branch-down)';
                    thumb.style.boxShadow = '0 0 10px rgba(105, 240, 174, 0.8), 0 2px 4px rgba(0,0,0,0.3)';
                }

                document.querySelector('.desc-scroll').scrollTop = 0;
                tc.classList.remove('fading');
            });
        });

        activeNodeId = id;
    }

    initUI();
    initUI();
</script>
</div>
</body>
</html>
